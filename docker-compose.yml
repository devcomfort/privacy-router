services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: privacy_router
      POSTGRES_PASSWORD: privacy_router
      POSTGRES_DB: privacy_router
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U privacy_router"]
      interval: 3s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8787:8787"
    env_file:
      - .env
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Admin frontend (SvelteKit SSG served by nginx) ──────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "8788:80"
    networks:
      - frontend
    restart: unless-stopped

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  pgdata:
